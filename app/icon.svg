<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="100%" stop-color="#E50914" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="#18181B"/>
  
  <!-- Film Reel / Clapperboard combination -->
  <g transform="translate(4, 4)">
    <!-- Clapperboard board -->
    <rect x="1" y="6" width="22" height="14" rx="2" fill="none" stroke="url(#redGrad)" stroke-width="2"/>
    <!-- Clapper top (slanted) -->
    <path d="M1 6 L23 6 L21 2 L3 2 Z" fill="url(#redGrad)"/>
    <!-- Stripes on the clapper top -->
    <path d="M6 2 L8 6" stroke="#18181B" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M11 2 L13 6" stroke="#18181B" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M16 2 L18 6" stroke="#18181B" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Play button in the center -->
    <polygon points="10,10 15,13 10,16" fill="url(#redGrad)"/>
  </g>
</svg>
